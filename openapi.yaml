openapi: 3.0.3
info:
  title: Garden Controller API
  version: 1.0.0
servers:
  - url: /
components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: x-api-token
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Relay:
      type: object
      properties:
        channel:
          type: integer
          minimum: 1
          maximum: 6
        state:
          type: string
          enum: [on, off]
      required: [channel, state]
    ControllerState:
      type: object
      properties:
        relays:
          type: array
          items:
            $ref: '#/components/schemas/Relay'
        queueDepth:
          type: integer
          minimum: 0
        serverTime:
          type: string
          format: date-time
        schedules:
          type: array
          items:
            type: string
      required: [relays, queueDepth, serverTime, schedules]
    CommandCreate:
      type: object
      properties:
        channel:
          type: integer
          minimum: 1
          maximum: 6
        action:
          type: string
          enum: [on, off, toggle]
        requestedBy:
          type: string
      required: [channel, action]
paths:
  /health:
    get:
      responses:
        '200':
          description: OK
  /api/relays:
    get:
      security:
        - ApiToken: []
      responses:
        '200':
          description: Current relay states
  /api/state:
    get:
      security:
        - ApiToken: []
      responses:
        '200':
          description: Full controller state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllerState'
  /api/commands:
    post:
      security:
        - ApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandCreate'
      responses:
        '201':
          description: Command queued
        '400':
          description: Invalid payload
  /api/queue/next:
    get:
      security:
        - ApiToken: []
      responses:
        '200':
          description: Next command for microcontroller
        '204':
          description: No pending command
  /api/news:
    get:
      security:
        - ApiToken: []
      responses:
        '200':
          description: News list
    post:
      security:
        - ApiToken: []
      responses:
        '201':
          description: News created
  /gui:
    get:
      security:
        - basicAuth: []
      responses:
        '200':
          description: Management GUI
  /openapi.json:
    get:
      responses:
        '200':
          description: OpenAPI document as JSON

  /gui/relays/{channel}/toggle:
    post:
      security:
        - basicAuth: []
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 6
      responses:
        '303':
          description: Relay toggle command queued and redirected to /gui
        '400':
          description: Invalid relay channel
