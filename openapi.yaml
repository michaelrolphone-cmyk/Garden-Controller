openapi: 3.0.3
info:
  title: Garden Controller API
  version: 1.1.0
  description: Relay channels=6, zone channels=5, master valve channel=6.
servers:
  - url: /
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Relay:
      type: object
      properties:
        channel: { type: integer, minimum: 1, maximum: 6 }
        state: { type: string, enum: [on, off] }
      required: [channel, state]
    ZoneColor:
      type: object
      properties:
        zone: { type: integer, minimum: 1, maximum: 5 }
        channel: { type: integer, minimum: 1, maximum: 5 }
        hex: { type: string, example: '#3b82f6' }
        rgb:
          type: object
          properties:
            r: { type: integer, minimum: 0, maximum: 255 }
            g: { type: integer, minimum: 0, maximum: 255 }
            b: { type: integer, minimum: 0, maximum: 255 }
      required: [zone, channel, hex, rgb]
    PublishedSchedule:
      type: object
      properties:
        id: { type: integer }
        channel: { type: integer, minimum: 1, maximum: 5 }
        zone: { type: string }
        enabled: { type: boolean, default: true }
        startTime: { type: string, example: '15:30' }
        durationSeconds: { type: integer, minimum: 1 }
      required: [channel, zone, startTime, durationSeconds]
paths:
  /health:
    get:
      responses:
        '200': { description: OK }
  /api/relays:
    get:
      responses:
        '200':
          description: Desired/reported relay states
          content:
            application/json:
              schema:
                type: object
                properties:
                  zoneColors:
                    type: array
                    items: { $ref: '#/components/schemas/ZoneColor' }
  /api/state:
    get:
      responses:
        '200':
          description: Full controller state
          content:
            application/json:
              schema:
                type: object
                properties:
                  zoneColors:
                    type: array
                    items: { $ref: '#/components/schemas/ZoneColor' }
  /api/commands:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel: { type: integer, minimum: 1, maximum: 6 }
                action: { type: string, enum: [on, off, toggle] }
                durationSeconds:
                  type: integer
                  minimum: 1
                  description: Used for timed ON runs (zones and channel 6); defaults to 900 seconds (15 minutes).
      responses:
        '201': { description: Command queued }
        '400': { description: Invalid payload }
  /api/spigots/run:
    post:
      responses:
        '201': { description: Spigot run command queued }
  /api/spigots/stop:
    post:
      responses:
        '201': { description: Spigot stop command queued }
  /api/queue/next:
    get:
      parameters:
        - name: wait
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 25
          description: Optional long-poll wait duration in seconds.
      responses:
        '200': { description: Delivered command }
        '204': { description: No pending command (immediate or long-poll timeout) }
  /api/microcontroller/commands/{id}/ack:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Command acknowledged }
        '404': { description: Command not found }
        '409': { description: Command not yet delivered }
  /api/microcontroller/state:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId, firmwareVersion, relays, schedules]
              properties:
                deviceId: { type: string }
                firmwareVersion: { type: string }
                clockValid: { type: boolean }
                epoch: { type: integer, description: Unix epoch seconds reported by firmware clock }
                localTime: { type: string }
                localDate: { type: string }
                homeWifiConnected: { type: boolean }
                homeIp: { type: string }
                relays:
                  type: array
                  items:
                    $ref: '#/components/schemas/Relay'
                schedules:
                  type: array
                  items:
                    $ref: '#/components/schemas/PublishedSchedule'
                currentRun:
                  type: object
                  additionalProperties: true
                lastCommandId: { type: string }
                targetLocation:
                  type: object
                  properties:
                    lat: { type: number }
                    lon: { type: number }
                    label: { type: string }
                sensorData:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        '200': { description: Canonical telemetry persisted }
        '400': { description: Invalid payload }
  /api/microcontroller/relays/state:
    post:
      responses:
        '200': { description: Relay state accepted and persisted }
        '400': { description: Invalid payload }
  /api/microcontroller/schedules:
    post:
      responses:
        '200': { description: Schedules accepted and persisted }
        '400': { description: Invalid payload }

  /api/microcontroller/sensors:
    post:
      responses:
        '201': { description: Sensor reading stored }
        '400': { description: Invalid sensor payload }

  /api/sensors:
    get:
      responses:
        '200': { description: Recent sensor readings }

  /api/sensors/latest:
    get:
      responses:
        '200': { description: Latest sensor reading }

  /api/weather/datasets:
    get:
      responses:
        '200': { description: Cached weather datasets }

  /api/weather/current:
    get:
      responses:
        '200': { description: Current weather dataset }

  /api/weather/forecast:
    get:
      responses:
        '200': { description: Forecast weather dataset }

  /api/weather/radar:
    get:
      responses:
        '200': { description: Radar dataset }

  /api/weather/satellite:
    get:
      responses:
        '200': { description: Satellite dataset }

  /api/weather/refresh:
    post:
      responses:
        '200': { description: Weather refresh completed }
        '502': { description: Weather refresh failed }
  /api/schedules:
    post:
      description: Replace the active daily schedule list with this ordered array. Multiple entries may use the same channel and an empty array clears all schedules.
      responses:
        '201': { description: Schedules stored and queued }
        '400': { description: Invalid payload }
  /api/schedules/{id}:
    delete:
      description: Delete a single schedule entry by id and queue a full schedule_update command for firmware.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Schedule removed and queued }
        '400': { description: Invalid schedule id }
        '404': { description: Schedule not found }
  /api/news:
    get:
      responses:
        '200': { description: News list }
    post:
      responses:
        '201': { description: News created }
  /gui:
    get:
      security:
        - basicAuth: []
      responses:
        '200': { description: Management GUI }
  /gui/state:
    get:
      security:
        - basicAuth: []
      responses:
        '200':
          description: GUI dynamic state payload (relays, schedules, server time)
          content:
            application/json:
              schema:
                type: object
                properties:
                  zoneColors:
                    type: array
                    items: { $ref: '#/components/schemas/ZoneColor' }
  /gui/relays/{channel}/on:
    post:
      security:
        - basicAuth: []
      responses:
        '303': { description: Relay ON command queued }
        '400': { description: Invalid relay channel }
  /gui/relays/{channel}/off:
    post:
      security:
        - basicAuth: []
      responses:
        '303': { description: Relay OFF command queued }
        '400': { description: Invalid relay channel }
  /gui/schedules:
    post:
      description: Submit the full daily schedule list from the GUI (edited rows plus new time slots) so the queued schedule_update command always contains complete schedules. Submitting an empty form clears all schedules.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                schedule[0][enabled]: { type: boolean, default: true }
                schedule[0][id]: { type: integer, description: Existing firmware schedule identifier to amend an existing entry. }
                schedule[0][channel]: { type: integer, minimum: 1, maximum: 5 }
                schedule[0][zone]: { type: string }
                schedule[0][startTime]: { type: string, example: '06:00' }
                schedule[0][durationMinutes]: { type: integer, minimum: 1 }
      responses:
        '303': { description: Schedule update queued }
        '400': { description: Invalid schedule payload }
  /gui/schedules/{id}/delete:
    post:
      description: Delete one schedule row by id from the GUI and queue a full replacement schedule_update command.
      security:
        - basicAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '303': { description: Schedule removed and redirected to GUI }
        '400': { description: Invalid schedule id }
        '404': { description: Schedule not found }
  /gui/spigots/run:
    post:
      security:
        - basicAuth: []
      responses:
        '303': { description: Spigot run command queued }
  /gui/spigots/stop:
    post:
      security:
        - basicAuth: []
      responses:
        '303': { description: Spigot stop command queued }
  /openapi.json:
    get:
      responses:
        '200': { description: OpenAPI document as JSON }
